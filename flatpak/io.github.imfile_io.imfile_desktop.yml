# 本地 Flatpak 打包：请先在 Linux 上执行 pnpm run build:linux:dir，再执行 pnpm run flatpak
# 依赖：flatpak、flatpak-builder，并已安装 org.freedesktop.Platform//25.08、org.electronjs.Electron2.BaseApp//25.08
app-id: io.github.imfile_io.imfile_desktop
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
base: org.electronjs.Electron2.BaseApp
base-version: '25.08'
command: imfile

finish-args:
  - --share=ipc
  - --share=network
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --filesystem=home
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.kde.StatusNotifierWatcher
  - --env=XCURSOR_PATH=~/.icons:/app/share/icons:/icons:/run/host/user-share/icons:/run/host/share/icons

modules:
  - name: imfile
    buildsystem: simple
    build-commands:
      - cp -a imfile-app/. /app/imfile
      - rm -f /app/imfile/chrome-sandbox
      - install -Dm755 start-imfile.sh /app/bin/imfile
      - install -Dm644 io.github.imfile_io.imfile_desktop.desktop /app/share/applications/io.github.imfile_io.imfile_desktop.desktop
      - install -Dm644 io.github.imfile_io.imfile_desktop.metainfo.xml /app/share/metainfo/io.github.imfile_io.imfile_desktop.metainfo.xml
      - install -Dm644 app-icon.png /app/share/icons/hicolor/512x512/apps/io.github.imfile_io.imfile_desktop.png
    sources:
      - type: dir
        path: stage/imfile-app
      - type: file
        path: start-imfile.sh
      - type: file
        path: ../build/flathub/io.github.imfile_io.imfile_desktop.desktop
      - type: file
        path: ../build/flathub/io.github.imfile_io.imfile_desktop.metainfo.xml
      - type: file
        path: ../src/renderer/assets/app-icon.png
        dest-filename: app-icon.png
