image: Visual Studio 2022

platform:
  - x64

cache:
  - node_modules
  - '%USERPROFILE%\.electron'

environment:
  nodejs_version: "24"

init:
  - git config --global core.autocrlf input

install:
  - ps: Install-Product node $env:nodejs_version
  - npm install -g pnpm@9
  - pnpm install --frozen-lockfile
  - node --version

build_script:
  - pnpm run release

test: off

branches:
  only:
    - master
