name: Build/release

on:
  push:
    # run only against tags
    tags:
      - '*'

jobs:
  release-linux:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Set build version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Cache node modules
        id: cache-npm
        uses: actions/cache@v5
        env:
          cache-name: cache-node-modules
        with:
          # npm cache files are stored in `~/.npm` on Linux/macOS
          path: ~/.npm
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-
            ${{ runner.os }}-build-
            ${{ runner.os }}-

      - name: rpm
        run: |
          sudo apt update 1>&2
          sudo apt install --install-recommends rpm -y 1>&2

      - name: Install Node.js, NPM and Yarn
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - run: yarn install --network-timeout 100000
      - run: node .electron-vue/build.js && npx electron-builder --publish=never

      - name: Upload Linux build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-linux
          path: |
            release/latest-linux.yml
            release/*.blockmap
            release/*.AppImage
            release/*.deb
            release/*.rpm
            release/*.snap
          if-no-files-found: error
          retention-days: 90

  release-macos:
    runs-on: macos-latest
    permissions:
      contents: read
    environment: release
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Set build version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Cache node modules
        id: cache-npm
        uses: actions/cache@v5
        env:
          cache-name: cache-node-modules
        with:
          # npm cache files are stored in `~/.npm` on Linux/macOS
          path: ~/.npm
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-
            ${{ runner.os }}-build-
            ${{ runner.os }}-

      - name: Install Node.js, NPM and Yarn
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - run: yarn install --network-timeout 100000
      - run: node .electron-vue/build.js && npx electron-builder --publish=never

      - name: Upload macOS build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-macos
          path: |
            release/latest-mac.yml
            release/*.dmg
            release/*.zip
          if-no-files-found: error
          retention-days: 90

  release-windows:
    runs-on: windows-latest
    environment: release
    permissions:
      contents: read
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set build version from tag
        run: |
          $version = $env:GITHUB_REF_NAME -replace '^v',''
          npm version $version --no-git-tag-version --allow-same-version

      - name: Cache node modules
        id: cache-npm
        uses: actions/cache@v5
        env:
          cache-name: cache-node-modules
        with:
          # npm cache files are stored in `~/.npm` on Linux/macOS
          path: ~/.npm
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-
            ${{ runner.os }}-build-
            ${{ runner.os }}-

      - name: Install Node.js, NPM and Yarn
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - run: yarn install --network-timeout 100000
      - run: node .electron-vue/build.js && npx electron-builder --publish=never

      - name: Upload Windows build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: |
            release/latest.yml
            release/*.blockmap
            release/*.exe
            release/*.appx
            release/*.zip
          if-no-files-found: error
          retention-days: 90

  create-release:
    runs-on: ubuntu-latest
    needs:
      - release-linux
      - release-macos
      - release-windows
    permissions:
      contents: write
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Prepare Linux artifacts for release
        uses: actions/download-artifact@v4
        with:
          name: release-linux
          path: release-artifacts/linux

      - name: Prepare macOS artifacts for release
        uses: actions/download-artifact@v4
        with:
          name: release-macos
          path: release-artifacts/macos

      - name: Prepare Windows artifacts for release
        uses: actions/download-artifact@v4
        with:
          name: release-windows
          path: release-artifacts/windows

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      # electron-updater 从 Release 资源拉取 latest*.yml；差分更新需同目录下的 *.blockmap
      - name: Create GitHub release from generated artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mapfile -t assets < <(find release-artifacts -type f)
          gh release create "imFile-${{ env.VERSION }}" \
            --title "${{ env.VERSION }}" \
            --target ${{ github.sha }} \
            --generate-notes \
            "${assets[@]}"