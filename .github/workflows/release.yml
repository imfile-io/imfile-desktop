name: Build/release

on:
  push:
    # run only against tags
    tags:
      - '*'

jobs:
  release-linux:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Set build version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: rpm
        run: |
          sudo apt update 1>&2
          sudo apt install --install-recommends rpm -y 1>&2

      - run: pnpm install --frozen-lockfile
      - run: node .electron-vue/build.js && npx electron-builder --publish=never

      - name: Upload Linux build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-linux
          path: |
            release/latest-linux.yml
            release/*.blockmap
            release/*.AppImage
            release/*.deb
            release/*.rpm
            release/*.snap
          if-no-files-found: error
          retention-days: 90

  release-macos:
    runs-on: macos-latest
    permissions:
      contents: read
    environment: release
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Set build version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - run: pnpm install --frozen-lockfile
      - run: node .electron-vue/build.js && npx electron-builder --publish=never

      - name: Upload macOS build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-macos
          path: |
            release/latest-mac.yml
            release/*.dmg
            release/*.zip
          if-no-files-found: error
          retention-days: 90

  release-windows:
    runs-on: windows-latest
    environment: release
    permissions:
      contents: read
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Set build version from tag
        run: |
          $version = $env:GITHUB_REF_NAME -replace '^v',''
          npm version $version --no-git-tag-version --allow-same-version

      - run: pnpm install --frozen-lockfile
      - run: node .electron-vue/build.js && npx electron-builder --win --x64 --publish=never

      - name: Upload Windows x64 build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-windows
          path: |
            release/latest*.yml
            release/*.blockmap
            release/*x64*.exe
            release/*x64*.appx
            release/*x64*.zip
          if-no-files-found: error
          retention-days: 90

  # 需 GitHub 托管的 windows-11-arm（公开仓库可用）；与 x64 分 job 避免安装包 / latest*.yml 同名冲突
  release-windows-arm64:
    runs-on: windows-11-arm
    environment: release
    permissions:
      contents: read
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Set build version from tag
        run: |
          $version = $env:GITHUB_REF_NAME -replace '^v',''
          npm version $version --no-git-tag-version --allow-same-version

      - run: pnpm install --frozen-lockfile
      - run: node .electron-vue/build.js && npx electron-builder --win --arm64 --publish=never

      - name: Upload Windows ARM64 build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-windows-arm64
          path: |
            release/latest*.yml
            release/*.blockmap
            release/*arm64*.exe
            release/*arm64*.appx
            release/*arm64*.zip
          if-no-files-found: error
          retention-days: 90

  create-release:
    runs-on: ubuntu-latest
    needs:
      - release-linux
      - release-macos
      - release-windows
      - release-windows-arm64
    permissions:
      contents: write
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v6

      - name: Prepare Linux artifacts for release
        uses: actions/download-artifact@v8
        with:
          name: release-linux
          path: release-artifacts/linux

      - name: Prepare macOS artifacts for release
        uses: actions/download-artifact@v8
        with:
          name: release-macos
          path: release-artifacts/macos

      - name: Prepare Windows x64 artifacts for release
        uses: actions/download-artifact@v8
        with:
          name: release-windows
          path: release-artifacts/windows-x64

      - name: Prepare Windows ARM64 artifacts for release
        uses: actions/download-artifact@v8
        with:
          name: release-windows-arm64
          path: release-artifacts/windows-arm64

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      # electron-updater 从 Release 资源拉取 latest*.yml；差分更新需同目录下的 *.blockmap
      - name: Create GitHub release from generated artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mapfile -t assets < <(find release-artifacts -type f)
          gh release create "imFile-${{ env.VERSION }}" \
            --title "${{ env.VERSION }}" \
            --target ${{ github.sha }} \
            --generate-notes \
            "${assets[@]}"