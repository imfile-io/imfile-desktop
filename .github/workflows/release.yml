name: Build/release

on:
  push:
    # run only against tags
    tags:
      - '*'

jobs:
  release-linux:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Set build version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: rpm
        run: |
          sudo apt update 1>&2
          sudo apt install --install-recommends rpm -y 1>&2

      - run: pnpm install --frozen-lockfile
      - run: pnpm run sync-go-aria2 && node .electron-vue/build.js && npx electron-builder --publish=never
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Linux build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-linux
          path: |
            release/latest-linux.yml
            release/*.blockmap
            release/*.AppImage
            release/*.deb
            release/*.rpm
            release/*.snap
          if-no-files-found: error
          retention-days: 90

  release-macos:
    runs-on: macos-latest
    permissions:
      contents: read
    environment: release
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Set build version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - run: pnpm install --frozen-lockfile
      - run: pnpm run sync-go-aria2 && node .electron-vue/build.js && npx electron-builder --publish=never
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload macOS build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-macos
          path: |
            release/latest-mac.yml
            release/*.dmg
            release/*.zip
          if-no-files-found: error
          retention-days: 90

  release-windows:
    runs-on: windows-latest
    environment: release
    permissions:
      contents: read
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Set build version from tag
        run: |
          $version = $env:GITHUB_REF_NAME -replace '^v',''
          npm version $version --no-git-tag-version --allow-same-version

      - run: pnpm install --frozen-lockfile
      - run: pnpm run sync-go-aria2 && node .electron-vue/build.js && npx electron-builder --win --x64 --publish=never
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows x64 build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-windows
          path: |
            release/latest*.yml
            release/*x64*.blockmap
            release/*x64*.exe
            release/*x64*.appx
            release/*x64*.zip
          if-no-files-found: error
          retention-days: 90

  # 需 GitHub 托管的 windows-11-arm（公开仓库可用）；与 x64 分 job 避免安装包 / latest*.yml 同名冲突
  release-windows-arm64:
    runs-on: windows-11-arm
    environment: release
    permissions:
      contents: read
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Set build version from tag
        run: |
          $version = $env:GITHUB_REF_NAME -replace '^v',''
          npm version $version --no-git-tag-version --allow-same-version

      - run: pnpm install --frozen-lockfile
      - run: pnpm run sync-go-aria2 && node .electron-vue/build.js && npx electron-builder --win --arm64 --publish=never
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows ARM64 build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-windows-arm64
          path: |
            release/latest*.yml
            release/*arm64*.blockmap
            release/*arm64*.exe
            release/*arm64*.appx
            release/*arm64*.zip
          if-no-files-found: error
          retention-days: 90

  create-release:
    runs-on: ubuntu-latest
    needs:
      - release-linux
      - release-macos
      - release-windows
      - release-windows-arm64
    permissions:
      contents: write
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v6

      - name: Prepare Linux artifacts for release
        uses: actions/download-artifact@v8
        with:
          name: release-linux
          path: release-artifacts/linux

      - name: Prepare macOS artifacts for release
        uses: actions/download-artifact@v8
        with:
          name: release-macos
          path: release-artifacts/macos

      - name: Prepare Windows x64 artifacts for release
        uses: actions/download-artifact@v8
        with:
          name: release-windows
          path: release-artifacts/windows-x64

      - name: Prepare Windows ARM64 artifacts for release
        uses: actions/download-artifact@v8
        with:
          name: release-windows-arm64
          path: release-artifacts/windows-arm64

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      # 与推送的 tag 一致（如 v1.2.3），否则资产会挂在 imFile-x.y.z 上而用户只看 v 标签的 Release
      # electron-updater 默认也匹配带 v 前缀的 release tag
      - name: Merge Windows latest.yml (单文件供 electron-updater，避免两 job 同名 latest.yml 上传失败)
        run: |
          set -euo pipefail
          OUT=release-artifacts/windows-combined
          mkdir -p "$OUT"
          # upload-artifact 会保留 release/ 前缀，解压后多为 .../release/latest.yml
          X_PATH=$(find release-artifacts/windows-x64 -name latest.yml -type f 2>/dev/null | head -n1 || true)
          A_PATH=$(find release-artifacts/windows-arm64 -name latest.yml -type f 2>/dev/null | head -n1 || true)
          export X_PATH A_PATH OUT_PATH="${OUT}/latest.yml"
          ruby <<'RUBY'
          require "yaml"
          x_path, a_path, out_path = ENV.fetch("X_PATH", ""), ENV.fetch("A_PATH", ""), ENV.fetch("OUT_PATH")
          paths = [x_path, a_path].reject(&:empty?).select { |p| File.file?(p) }
          abort "No Windows latest.yml found under release-artifacts/windows-*" if paths.empty?
          loaded = paths.map { |p| YAML.load_file(p) }
          merged =
            if loaded.size == 1
              loaded[0]
            else
              wx, wa = loaded
              files = (wx["files"] || []) + (wa["files"] || [])
              by_url = {}
              files.each { |f| by_url[f["url"]] = f if f.is_a?(Hash) && f["url"] }
              primary = by_url.values.find { |f| f["url"].to_s.include?("x64") } || by_url.values.first
              m = wx.merge(
                "files" => by_url.values,
                "releaseDate" => [wx["releaseDate"], wa["releaseDate"]].compact.max
              )
              if primary
                m["path"] = primary["url"]
                m["sha512"] = primary["sha512"]
              end
              m
            end
          File.write(out_path, YAML.dump(merged))
          RUBY
          [[ -n "${X_PATH:-}" ]] && rm -f "$X_PATH"
          [[ -n "${A_PATH:-}" ]] && rm -f "$A_PATH"

      # 防止 yml 与 exe 来自不同构建（手动重传、合并错误等）；不通过则不上传 Release
      - name: Verify merged Windows latest.yml matches on-disk installers
        run: |
          set -euo pipefail
          YML="release-artifacts/windows-combined/latest.yml"
          test -f "$YML"
          export YML
          ruby <<'RUBY'
          require "yaml"
          require "digest"
          require "base64"

          root = "release-artifacts"
          yml_path = ENV.fetch("YML")
          data = YAML.load_file(yml_path)
          files = data["files"] || []
          abort "latest.yml has no files[]" if files.empty?

          files.each do |entry|
            next unless entry.is_a?(Hash) && entry["url"]
            name = File.basename(entry["url"].to_s)
            next unless name.end_with?(".exe")
            path = Dir.glob(File.join(root, "**", name)).find { |p| File.file?(p) }
            abort "missing file for #{name} (declared in latest.yml)" unless path
            bytes = File.binread(path)
            expected_size = entry["size"]
            if expected_size && bytes.bytesize != expected_size
              abort "size mismatch #{name}: yml=#{expected_size} actual=#{bytes.bytesize}"
            end
            actual_b64 = Base64.strict_encode64(Digest::SHA512.digest(bytes))
            expected_b64 = entry["sha512"].to_s.strip
            if actual_b64 != expected_b64
              abort "sha512 mismatch #{name}: yml=#{expected_b64} actual=#{actual_b64}"
            end
            puts "ok #{name} #{bytes.bytesize} bytes"
          end

          primary_url = data["path"]
          if primary_url && !primary_url.to_s.empty?
            name = File.basename(primary_url.to_s)
            path = Dir.glob(File.join(root, "**", name)).find { |p| File.file?(p) }
            abort "missing primary path #{name}" unless path
            bytes = File.binread(path)
            actual_b64 = Base64.strict_encode64(Digest::SHA512.digest(bytes))
            if actual_b64 != data["sha512"].to_s.strip
              abort "sha512 mismatch top-level path #{name}"
            end
          end
          puts "Windows latest.yml OK: #{yml_path}"
          RUBY

      # electron-updater 从 Release 资源拉取 latest*.yml；差分更新需同目录下的 *.blockmap
      - name: Create GitHub release from generated artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          release_tag="${GITHUB_REF_NAME}"

          if ! gh release view "$release_tag" >/dev/null 2>&1; then
            gh release create "$release_tag" \
              --title "${{ env.VERSION }}" \
              --target ${{ github.sha }} \
              --generate-notes
          fi

          declare -A seen_assets=()
          assets=()

          add_assets () {
            while IFS= read -r -d '' asset; do
              asset_name="$(basename "$asset")"
              if [[ -n "${seen_assets[$asset_name]:-}" ]]; then
                echo "::error::Duplicate release asset name '$asset_name' from '$asset' and '${seen_assets[$asset_name]}'"
                exit 1
              fi
              seen_assets["$asset_name"]="$asset"
              assets+=("$asset")
            done
          }

          # 先上传二进制与 blockmap，最后上传 latest*.yml，降低用户短暂拉到新 yml 与旧包不一致的概率
          add_assets < <(find release-artifacts -type f ! -name 'latest*.yml' -print0 | sort -z)
          add_assets < <(find release-artifacts -type f -name 'latest*.yml' -print0 | sort -z)

          if [[ ${#assets[@]} -eq 0 ]]; then
            echo "::error::No files under release-artifacts to upload; check build artifact paths."
            exit 1
          fi

          gh release upload "$release_tag" --clobber "${assets[@]}"